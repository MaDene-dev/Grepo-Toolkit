name: Grepolis Bot

on:
  schedule:
    # Start elke 50 minuten (GitHub Actions heeft max ~6u runtime)
    - cron: "*/50 * * * *"
  workflow_dispatch: # Handmatig starten via GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 48

    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Node.js instellen
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Dependencies installeren
        run: npm ci --omit=dev

      - name: Bot starten
        env:
          GREPO_EMAIL:    ${{ secrets.GREPO_EMAIL }}
          GREPO_PASSWORD: ${{ secrets.GREPO_PASSWORD }}
          SMTP_USER:      ${{ secrets.SMTP_USER }}
          SMTP_PASS:      ${{ secrets.SMTP_PASS }}
          SMTP_TO:        ${{ secrets.SMTP_TO }}
        run: node src/index.js
