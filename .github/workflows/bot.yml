name: Grepo Toolkit — Village Agent

on:
  schedule:
    - cron: "*/50 * * * *"
  workflow_dispatch:

concurrency:
  group: grepo-toolkit
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 48

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Install Chromium for Puppeteer
        run: node node_modules/puppeteer/install.mjs

      - name: Write cookies
        run: |
          if [ -n "$GREPO_COOKIES" ]; then
            echo "$GREPO_COOKIES" > cookies.json
          fi
        env:
          GREPO_COOKIES: ${{ secrets.GREPO_COOKIES }}

      - name: Run Village Agent
        env:
          GREPO_EMAIL:          ${{ secrets.GREPO_EMAIL }}
          GREPO_PASSWORD:       ${{ secrets.GREPO_PASSWORD }}
          GAS_URL:              ${{ secrets.GAS_URL }}
          GAS_SECRET:           ${{ secrets.GAS_SECRET }}
          GREPO_ACCOUNT:        ${{ secrets.GREPO_ACCOUNT }}
          SMTP_USER:            ${{ secrets.SMTP_USER }}
          SMTP_PASS:            ${{ secrets.SMTP_PASS }}
          SMTP_TO:              ${{ secrets.SMTP_TO }}
        run: node src/index.js

