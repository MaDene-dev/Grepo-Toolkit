name: Keepalive

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Lege commit om repo actief te houden
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keepalive $(date +'%Y-%m-%d')"
          git push
